<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Boda Jeifry & Karen</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    background: #f0ece4;
    color: #3A3028;
    min-height: 100vh;
  }
  header {
    background: #2C4160;
    color: white;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 26px;
    letter-spacing: .5px;
  }
  header p { font-size: 12px; opacity: .7; margin-top: 4px; letter-spacing: 1px; }
  .container { max-width: 900px; margin: 0 auto; padding: 32px 20px 64px; }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 32px;
  }
  .card {
    background: white;
    border-radius: 14px;
    padding: 18px 20px;
    border: 1px solid #EDE8DD;
  }
  .card-value { font-size: 36px; font-family: 'Cormorant Garamond', serif; font-weight: 300; color: #2C4160; line-height: 1; }
  .card-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #7A6E63; margin-top: 6px; }
  .card.confirmed .card-value { color: #3a7a5a; }
  .card.declined  .card-value { color: #8b3030; }
  .card.pending   .card-value { color: #7A9FBF; }
  .dishes-row { display: flex; gap: 10px; margin-bottom: 32px; flex-wrap: wrap; }
  .dish-chip {
    background: #DDE9F3;
    border: 1px solid #B8D0E5;
    border-radius: 40px;
    padding: 8px 18px;
    font-size: 13px;
    color: #2C4160;
  }
  .dish-chip strong { font-weight: 700; margin-right: 6px; }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 22px;
    color: #2C4160;
    margin-bottom: 14px;
  }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  thead { background: #2C4160; color: white; }
  thead th { padding: 12px 14px; text-align: left; font-size: 11px; letter-spacing: 2px; font-weight: 400; text-transform: uppercase; }
  tbody tr { border-bottom: 1px solid #F0EDE8; transition: background .15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #F8F5EE; }
  td { padding: 12px 14px; font-size: 13px; vertical-align: top; }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: .5px;
    white-space: nowrap;
  }
  .badge-confirmed { background: #d4edda; color: #1a5e35; }
  .badge-declined  { background: #f8d7da; color: #6e1a1a; }
  .badge-pending   { background: #e2edf8; color: #2C4160; }
  .person-row { margin-bottom: 4px; }
  .person-name { font-weight: 400; color: #3A3028; }
  .person-dish { font-size: 11px; color: #7A6E63; }
  #login-overlay {
    position: fixed; inset: 0; background: #2C4160;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    color: white;
  }
  #login-overlay h2 { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 28px; font-weight: 300; }
  #login-overlay input {
    padding: 12px 18px; border-radius: 10px; border: none;
    font-family: 'Lato'; font-size: 15px; width: 260px;
    background: rgba(255,255,255,.12); color: white;
    outline: none; text-align: center; letter-spacing: 2px;
  }
  #login-overlay input::placeholder { color: rgba(255,255,255,.5); letter-spacing: 1px; font-size: 13px; }
  #login-overlay button {
    padding: 12px 32px; border-radius: 10px;
    background: #7A9FBF; border: none; color: white;
    font-family: 'Lato'; font-size: 14px; cursor: pointer;
    letter-spacing: 1px;
  }
  #login-overlay .err { color: #f8a0a0; font-size: 13px; }
  .refresh-btn {
    background: none; border: 1px solid rgba(255,255,255,.4); color: white;
    border-radius: 8px; padding: 6px 14px; font-family: 'Lato'; font-size: 12px;
    cursor: pointer; letter-spacing: 1px;
  }
  .refresh-btn:hover { background: rgba(255,255,255,.1); }
  .loading { text-align: center; padding: 64px 0; color: #7A6E63; font-size: 18px; font-family: 'Cormorant Garamond', serif; font-style: italic; }
  @media (max-width: 700px) {
    .cards { grid-template-columns: repeat(2, 1fr); }
    thead th:nth-child(5), td:nth-child(5) { display: none; }
    thead th:nth-child(4), td:nth-child(4) { display: none; }
  }
</style>
</head>
<body>

<!-- Login overlay -->
<div id="login-overlay">
  <h2>Panel de Administración</h2>
  <p style="font-size:13px; opacity:.7; letter-spacing:1px;">Jeifry & Karen · 19 Jun 2026</p>
  <input type="password" id="token-input" placeholder="Ingresa el token de acceso" />
  <button onclick="doLogin()">Entrar</button>
  <p class="err" id="login-err"></p>
</div>

<header>
  <div>
    <h1>Panel de administración</h1>
    <p>JEIFRY & KAREN · 19 JUNIO 2026</p>
  </div>
  <button class="refresh-btn" onclick="loadData()">↻ Actualizar</button>
</header>

<div class="container">
  <div id="content" class="loading">Cargando…</div>
</div>

<script>
let adminToken = '';

function doLogin() {
  const val = document.getElementById('token-input').value.trim();
  if (!val) return;
  adminToken = val;
  loadData();
}

document.getElementById('token-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

const DISH_LABELS = {
  pollo_tallarines:  'Pollo c/ tallarines',
  pollo_champi:      'Pollo champiñones',
  pescado_teriyaki:  'Pescado teriyaki',
};

async function loadData() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Cargando…</div>';

  try {
    const res  = await fetch(`/api/admin/rsvps?token=${encodeURIComponent(adminToken)}`);
    const data = await res.json();

    if (!res.ok) {
      document.getElementById('login-err').textContent = data.error || 'Token inválido';
      adminToken = '';
      return;
    }

    // Hide login overlay
    document.getElementById('login-overlay').style.display = 'none';

    const { summary, guests } = data;
    const { total, confirmed, declined, pending, total_attendees, dishes } = summary;

    content.innerHTML = `
      <div class="cards">
        <div class="card"><div class="card-value">${total}</div><div class="card-label">Invitados totales</div></div>
        <div class="card confirmed"><div class="card-value">${confirmed}</div><div class="card-label">Confirmados</div></div>
        <div class="card declined"><div class="card-value">${declined}</div><div class="card-label">No asisten</div></div>
        <div class="card pending"><div class="card-value">${pending}</div><div class="card-label">Sin respuesta</div></div>
        <div class="card"><div class="card-value">${total_attendees}</div><div class="card-label">Asistentes totales</div></div>
      </div>

      <div class="dishes-row">
        <div class="dish-chip"><strong>🍜 ${dishes.pollo_tallarines}</strong>Pollo c/ tallarines</div>
        <div class="dish-chip"><strong>🍗 ${dishes.pollo_champi}</strong>Pollo champiñones</div>
        <div class="dish-chip"><strong>🐟 ${dishes.pescado_teriyaki}</strong>Pescado teriyaki</div>
      </div>

      <p class="section-title">Lista de invitados</p>
      <table>
        <thead>
          <tr>
            <th>Invitado</th>
            <th>Código / Enlace</th>
            <th>Estado</th>
            <th>Selección de platos</th>
            <th>Respondió</th>
          </tr>
        </thead>
        <tbody>
          ${guests.map(g => {
            const badge = g.attending === true
              ? '<span class="badge badge-confirmed">✓ Confirmado</span>'
              : g.attending === false
                ? '<span class="badge badge-declined">✗ No asiste</span>'
                : '<span class="badge badge-pending">· Pendiente</span>';

            const people = (g.people || []).map(p => `
              <div class="person-row">
                <span class="person-name">${p.person_name}${p.is_companion ? ' (acompañante)' : ''}</span>
                ${p.dish ? `<div class="person-dish">${DISH_LABELS[p.dish] || p.dish}</div>` : ''}
              </div>
            `).join('');

            const date = g.submitted_at
              ? new Date(g.submitted_at).toLocaleDateString('es-CO', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })
              : '—';

            const inviteUrl = `${location.origin}/?g=${g.invite_code}`;

            return `
              <tr>
                <td>
                  <strong>${g.name}</strong>
                  <div style="font-size:11px;color:#7A6E63;margin-top:2px">
                    cupo: ${g.max_companions === 0 ? '1 persona' : g.max_companions === 1 ? '1+1' : '1+2'}
                  </div>
                </td>
                <td>
                  <code style="font-size:12px;background:#f0ece4;padding:2px 6px;border-radius:4px;letter-spacing:1px">${g.invite_code}</code>
                  <button onclick="navigator.clipboard.writeText('${inviteUrl}').then(()=>this.textContent='✓').catch(()=>{})"
                    style="display:block;margin-top:4px;background:none;border:1px solid #B8D0E5;border-radius:6px;padding:3px 8px;font-size:11px;color:#4A6F8F;cursor:pointer">
                    Copiar enlace
                  </button>
                </td>
                <td>${badge}</td>
                <td>${people || '<span style="color:#ccc;font-size:12px">—</span>'}</td>
                <td style="font-size:12px;color:#7A6E63">${date}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    `;
  } catch (err) {
    content.innerHTML = '<div class="loading" style="color:#B05050">Error al cargar. Revisa tu conexión.</div>';
  }
}

// Auto-load if token is in URL param (e.g. ?token=xxx)
const urlToken = new URLSearchParams(window.location.search).get('token');
if (urlToken) {
  adminToken = urlToken;
  loadData();
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Boda Jeifry & Karen</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    background: #f0ece4;
    color: #3A3028;
    min-height: 100vh;
  }
  header {
    background: #2C4160;
    color: white;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 26px;
    letter-spacing: .5px;
  }
  header p { font-size: 12px; opacity: .7; margin-top: 4px; letter-spacing: 1px; }
  .container { max-width: 900px; margin: 0 auto; padding: 32px 20px 64px; }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 32px;
  }
  .card {
    background: white;
    border-radius: 14px;
    padding: 18px 20px;
    border: 1px solid #EDE8DD;
  }
  .card-value { font-size: 36px; font-family: 'Cormorant Garamond', serif; font-weight: 300; color: #2C4160; line-height: 1; }
  .card-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #7A6E63; margin-top: 6px; }
  .card.confirmed .card-value { color: #3a7a5a; }
  .card.declined  .card-value { color: #8b3030; }
  .card.pending   .card-value { color: #7A9FBF; }
  .dishes-row { display: flex; gap: 10px; margin-bottom: 32px; flex-wrap: wrap; }
  .dish-chip {
    background: #DDE9F3;
    border: 1px solid #B8D0E5;
    border-radius: 40px;
    padding: 8px 18px;
    font-size: 13px;
    color: #2C4160;
  }
  .dish-chip strong { font-weight: 700; margin-right: 6px; }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 22px;
    color: #2C4160;
    margin-bottom: 14px;
  }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  thead { background: #2C4160; color: white; }
  thead th { padding: 12px 14px; text-align: left; font-size: 11px; letter-spacing: 2px; font-weight: 400; text-transform: uppercase; }
  tbody tr { border-bottom: 1px solid #F0EDE8; transition: background .15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #F8F5EE; }
  td { padding: 12px 14px; font-size: 13px; vertical-align: top; }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: .5px;
    white-space: nowrap;
  }
  .badge-confirmed { background: #d4edda; color: #1a5e35; }
  .badge-declined  { background: #f8d7da; color: #6e1a1a; }
  .badge-pending   { background: #e2edf8; color: #2C4160; }
  .person-row { margin-bottom: 4px; }
  .person-name { font-weight: 400; color: #3A3028; }
  .person-dish { font-size: 11px; color: #7A6E63; }
  #login-overlay {
    position: fixed; inset: 0; background: #2C4160;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    color: white;
  }
  #login-overlay h2 { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 28px; font-weight: 300; }
  #login-overlay input {
    padding: 12px 18px; border-radius: 10px; border: none;
    font-family: 'Lato'; font-size: 15px; width: 260px;
    background: rgba(255,255,255,.12); color: white;
    outline: none; text-align: center; letter-spacing: 2px;
  }
  #login-overlay input::placeholder { color: rgba(255,255,255,.5); letter-spacing: 1px; font-size: 13px; }
  #login-overlay button {
    padding: 12px 32px; border-radius: 10px;
    background: #7A9FBF; border: none; color: white;
    font-family: 'Lato'; font-size: 14px; cursor: pointer;
    letter-spacing: 1px;
  }
  #login-overlay .err { color: #f8a0a0; font-size: 13px; }
  .refresh-btn {
    background: none; border: 1px solid rgba(255,255,255,.4); color: white;
    border-radius: 8px; padding: 6px 14px; font-family: 'Lato'; font-size: 12px;
    cursor: pointer; letter-spacing: 1px;
  }
  .refresh-btn:hover { background: rgba(255,255,255,.1); }
  .loading { text-align: center; padding: 64px 0; color: #7A6E63; font-size: 18px; font-family: 'Cormorant Garamond', serif; font-style: italic; }
  .add-panel { max-width: 900px; margin: 28px auto 0; padding: 0 20px; display: none; }
  .add-panel-inner { background: white; border-radius: 14px; border: 1px solid #EDE8DD; padding: 20px 24px; }
  .add-panel-inner .section-title { margin-bottom: 14px; }
  .add-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
  .add-field { display: flex; flex-direction: column; }
  .add-field label { font-size: 11px; letter-spacing: 2px; color: #7A6E63; text-transform: uppercase; margin-bottom: 6px; }
  .add-field input, .add-field select {
    padding: 10px 14px; border-radius: 8px; border: 1px solid #E2DDD4;
    font-family: 'Lato'; font-size: 14px; font-weight: 300; color: #3A3028;
    background: white; outline: none;
  }
  .add-field.grow { flex: 1; min-width: 180px; }
  .btn-add {
    padding: 10px 22px; background: #2C4160; color: white;
    border: none; border-radius: 8px; font-family: 'Lato'; font-size: 13px;
    cursor: pointer; letter-spacing: 1px; white-space: nowrap; align-self: flex-end;
  }
  .btn-add:hover { background: #3a5478; }
  .btn-del {
    background: none; border: 1px solid #f8d7da; color: #8b3030;
    border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer;
    font-family: 'Lato'; white-space: nowrap; display: block; margin-top: 5px;
  }
  .btn-del:hover { background: #fdf0f0; }
  .btn-send {
    background: #2C4160; border: none; color: white;
    border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer;
    font-family: 'Lato'; white-space: nowrap; display: block; margin-bottom: 4px;
  }
  .btn-send:hover { background: #3a5478; }
  .btn-resend {
    background: none; border: 1px solid #B8D0E5; color: #2C4160;
    border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer;
    font-family: 'Lato'; white-space: nowrap; display: block; margin-bottom: 4px;
  }
  .btn-resend:hover { background: #DDE9F3; }
  .btn-resend:disabled, .btn-send:disabled { opacity: .4; cursor: default; }
  .notified-date { font-size: 10px; color: #7A6E63; margin-bottom: 4px; }
  .search-wrap { margin-bottom: 14px; position: relative; }
  .search-wrap input {
    width: 100%; padding: 10px 14px 10px 36px; border-radius: 10px;
    border: 1px solid #E2DDD4; background: white;
    font-family: 'Lato'; font-size: 13px; font-weight: 300; color: #3A3028; outline: none;
  }
  .search-wrap input:focus { border-color: #7A9FBF; }
  .search-wrap .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: #B0A898; font-size: 14px; pointer-events: none;
  }
  .no-results { text-align: center; padding: 28px; color: #7A6E63; font-style: italic; font-family: 'Cormorant Garamond', serif; font-size: 16px; }
  #add-msg { font-size: 12px; margin-top: 10px; display: none; }

  /* ── Modal reenvío ── */
  #resend-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.45); z-index: 100;
    align-items: center; justify-content: center; padding: 20px;
  }
  #resend-overlay.open { display: flex; }
  .wa-bar {
    background: white;
    border-bottom: 1px solid #EDE8DD;
    padding: 12px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
  }
  .wa-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #ccc;
    flex-shrink: 0;
  }
  .wa-dot.connected { background: #3a7a5a; }
  .wa-dot.waiting   { background: #e0a030; }
  .wa-label { color: #3A3028; }
  .wa-btn {
    margin-left: auto;
    background: #25D366;
    color: white;
    border: none;
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .wa-btn:hover { background: #1ebe5a; }
  #wa-qr-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  #wa-qr-overlay.open { display: flex; }
  #wa-qr-box {
    background: white;
    border-radius: 16px;
    padding: 32px;
    text-align: center;
    max-width: 340px;
    width: 90%;
  }
  #wa-qr-box h3 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 22px;
    color: #2C4160;
    margin-bottom: 6px;
  }
  #wa-qr-box p { font-size: 12px; color: #7A6E63; margin-bottom: 20px; }
  #wa-qr-canvas { margin: 0 auto; display: block; }
  #wa-qr-msg { font-size: 12px; color: #7A6E63; margin-top: 16px; min-height: 18px; }
  #wa-qr-close {
    margin-top: 16px;
    background: none;
    border: 1px solid #ccc;
    border-radius: 20px;
    padding: 6px 20px;
    cursor: pointer;
    font-size: 12px;
    color: #7A6E63;
  }
  #resend-modal {
    background: white; border-radius: 18px; width: 100%; max-width: 500px;
    box-shadow: 0 8px 40px rgba(0,0,0,.18); overflow: hidden;
  }
  #resend-modal .modal-header {
    background: #2C4160; padding: 20px 24px; color: white;
  }
  #resend-modal .modal-header h3 {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 20px; font-weight: 300; margin: 0;
  }
  #resend-modal .modal-header p {
    font-size: 12px; opacity: .65; letter-spacing: 1px; margin-top: 4px;
  }
  #resend-modal .modal-body { padding: 22px 24px; }
  #resend-modal textarea {
    width: 100%; height: 240px; padding: 14px; border-radius: 10px;
    border: 1px solid #E2DDD4; font-family: 'Lato'; font-size: 13px;
    font-weight: 300; color: #3A3028; resize: vertical; outline: none;
    line-height: 1.7;
  }
  #resend-modal textarea:focus { border-color: #7A9FBF; }
  #resend-modal .modal-footer {
    padding: 0 24px 22px; display: flex; gap: 10px; justify-content: flex-end;
  }
  #resend-modal .btn-cancel {
    padding: 10px 22px; background: none; border: 1px solid #E2DDD4;
    border-radius: 8px; font-family: 'Lato'; font-size: 13px; color: #7A6E63;
    cursor: pointer;
  }
  #resend-modal .btn-cancel:hover { background: #F8F5EE; }
  #resend-modal .btn-send {
    padding: 10px 24px; background: #2C4160; border: none;
    border-radius: 8px; font-family: 'Lato'; font-size: 13px; color: white;
    cursor: pointer; letter-spacing: .5px;
  }
  #resend-modal .btn-send:hover { background: #3a5478; }
  #resend-modal .btn-send:disabled { opacity: .6; cursor: default; }
  #resend-msg { font-size: 12px; margin: 0 24px 14px; display: none; }

  @media (max-width: 700px) {
    .cards { grid-template-columns: repeat(2, 1fr); }
    thead th:nth-child(5), td:nth-child(5) { display: none; }
    thead th:nth-child(4), td:nth-child(4) { display: none; }
  }
</style>
</head>
<body>

<!-- Login overlay -->
<div id="login-overlay">
  <h2>Panel de Administración</h2>
  <p style="font-size:13px; opacity:.7; letter-spacing:1px;">Jeifry & Karen · 19 Jun 2026</p>
  <input type="password" id="token-input" placeholder="Ingresa el token de acceso" />
  <button onclick="doLogin()">Entrar</button>
  <p class="err" id="login-err"></p>
</div>

<header>
  <div>
    <h1>Panel de administración</h1>
    <p>JEIFRY & KAREN · 19 JUNIO 2026</p>
  </div>
  <button class="refresh-btn" onclick="loadData()">↻ Actualizar</button>
</header>

<!-- Barra estado WhatsApp -->
<div class="wa-bar" id="wa-bar" style="display:none">
  <div class="wa-dot" id="wa-dot"></div>
  <span class="wa-label" id="wa-label">WhatsApp…</span>
  <button class="wa-btn" id="wa-qr-btn" onclick="openQR()" style="display:none">Ver QR</button>
</div>

<!-- Modal QR -->
<div id="wa-qr-overlay">
  <div id="wa-qr-box">
    <h3>Escanea el QR</h3>
    <p>Abre WhatsApp → Dispositivos vinculados → Vincular dispositivo</p>
    <canvas id="wa-qr-canvas"></canvas>
    <p id="wa-qr-msg"></p>
    <button id="wa-qr-close" onclick="closeQR()">Cerrar</button>
  </div>
</div>

<!-- Formulario agregar invitado -->
<div class="add-panel" id="add-panel">
  <div class="add-panel-inner">
    <p class="section-title">Agregar invitado</p>
    <div class="add-row">
      <div class="add-field grow">
        <label for="new-name">Nombre</label>
        <input id="new-name" type="text" placeholder="Nombre completo" />
      </div>
      <div class="add-field">
        <label for="new-companions">Cupo</label>
        <select id="new-companions">
          <option value="0">Solo (1 persona)</option>
          <option value="1">1 + 1 acompañante</option>
          <option value="2">1 + 2 acompañantes</option>
        </select>
      </div>
      <div class="add-field" style="min-width:160px">
        <label for="new-phone">WhatsApp</label>
        <input id="new-phone" type="tel" placeholder="Ej: 3001234567" />
      </div>
      <button class="btn-add" onclick="addGuest()">+ Agregar</button>
    </div>
    <p id="add-msg"></p>
  </div>
</div>

<div class="container">
  <div id="content" class="loading">Cargando…</div>
</div>

<!-- Modal reenviar invitación -->
<div id="resend-overlay">
  <div id="resend-modal">
    <div class="modal-header">
      <h3 id="resend-title">Reenviar invitación</h3>
      <p id="resend-phone"></p>
    </div>
    <div class="modal-body">
      <p style="font-size:11px;letter-spacing:2px;color:#7A6E63;text-transform:uppercase;margin-bottom:8px">Mensaje a enviar</p>
      <textarea id="resend-text"></textarea>
    </div>
    <p id="resend-msg"></p>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeResendModal()">Cancelar</button>
      <button class="btn-send" id="resend-send-btn" onclick="sendResend()">Enviar por WhatsApp</button>
    </div>
  </div>
</div>

<script>
let adminToken = '';
let _resendGuestId = null;

function doLogin() {
  const val = document.getElementById('token-input').value.trim();
  if (!val) return;
  adminToken = val;
  loadData();
}

document.getElementById('token-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

const DISH_LABELS = {
  pollo_tallarines:  'Pollo c/ tallarines',
  pollo_champi:      'Pollo champiñones',
  pescado_teriyaki:  'Pescado teriyaki',
};

async function loadData() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Cargando…</div>';

  try {
    const res  = await fetch(`/api/admin/rsvps?token=${encodeURIComponent(adminToken)}`);
    const data = await res.json();

    if (!res.ok) {
      document.getElementById('login-err').textContent = data.error || 'Token inválido';
      adminToken = '';
      return;
    }

    // Hide login overlay, show add-guest panel
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('add-panel').style.display = 'block';
    document.getElementById('wa-bar').style.display = 'flex';
    startWAPolling();

    const { summary, guests } = data;
    const { total, confirmed, declined, pending, notified, total_attendees, dishes } = summary;

    content.innerHTML = `
      <div class="cards">
        <div class="card"><div class="card-value">${total}</div><div class="card-label">Invitados totales</div></div>
        <div class="card confirmed"><div class="card-value">${confirmed}</div><div class="card-label">Confirmados</div></div>
        <div class="card declined"><div class="card-value">${declined}</div><div class="card-label">No asisten</div></div>
        <div class="card pending"><div class="card-value">${pending}</div><div class="card-label">Sin respuesta</div></div>
        <div class="card"><div class="card-value">${total_attendees}</div><div class="card-label">Asistentes totales</div></div>
        <div class="card" style="border-left:3px solid #2C4160">
          <div class="card-value" style="font-size:28px;display:flex;align-items:center;gap:8px">
            ${notified}
            <span style="font-size:13px;background:#2C4160;color:white;border-radius:20px;padding:2px 10px;font-family:Lato;font-weight:400;letter-spacing:.5px">${notified}/${total}</span>
          </div>
          <div class="card-label">Invitaciones enviadas</div>
        </div>
      </div>

      <div class="dishes-row">
        <div class="dish-chip"><strong>🍜 ${dishes.pollo_tallarines}</strong>Pollo c/ tallarines</div>
        <div class="dish-chip"><strong>🍗 ${dishes.pollo_champi}</strong>Pollo champiñones</div>
        <div class="dish-chip"><strong>🐟 ${dishes.pescado_teriyaki}</strong>Pescado teriyaki</div>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px">
        <p class="section-title" style="margin-bottom:0">Lista de invitados</p>
        <div class="search-wrap" style="width:260px;margin-bottom:0">
          <span class="search-icon">🔍</span>
          <input type="text" id="guest-search" placeholder="Buscar por nombre…" oninput="filterGuests(this.value)" />
        </div>
      </div>

      <table id="guests-table">
        <thead>
          <tr>
            <th>Invitado</th>
            <th>Código / Enlace</th>
            <th>Estado</th>
            <th>Selección de platos</th>
            <th>Respondió</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="guests-tbody">
          ${guests.map(g => {
            const badge = g.attending === true
              ? '<span class="badge badge-confirmed">✓ Confirmado</span>'
              : g.attending === false
                ? '<span class="badge badge-declined">✗ No asiste</span>'
                : '<span class="badge badge-pending">· Pendiente</span>';

            const people = (g.people || []).map(p => `
              <div class="person-row">
                <span class="person-name">${p.person_name}${p.is_companion ? ' (acompañante)' : ''}</span>
                ${p.dish ? `<div class="person-dish">${DISH_LABELS[p.dish] || p.dish}</div>` : ''}
              </div>
            `).join('');

            const date = g.submitted_at
              ? new Date(g.submitted_at).toLocaleDateString('es-CO', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })
              : '—';

            const inviteUrl = `${location.origin}/?g=${g.invite_code}`;

            const notifDate = g.notified_at
              ? new Date(g.notified_at).toLocaleDateString('es-CO', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })
              : null;

            // JSON.stringify produce comillas dobles; las escapamos para no romper el atributo onclick=""
            const jName = JSON.stringify(g.name).replace(/"/g, '&quot;');

            let actionBtn = '';
            if (!g.phone) {
              actionBtn = `<button class="btn-send" disabled title="Sin WhatsApp registrado">📤 Enviar</button>`;
            } else if (!g.notified_at) {
              actionBtn = `<button class="btn-send" onclick="openResendModal('${g.id}', ${jName}, '${g.invite_code}', '${g.phone}', true)">📤 Enviar</button>`;
            } else {
              actionBtn = `
                <div class="notified-date">✓ Enviado ${notifDate}</div>
                <button class="btn-resend" onclick="openResendModal('${g.id}', ${jName}, '${g.invite_code}', '${g.phone}', false)">↩ Reenviar</button>
              `;
            }

            return `
              <tr data-name="${g.name.toLowerCase()}">
                <td>
                  <strong>${g.name}</strong>
                  <div style="font-size:11px;color:#7A6E63;margin-top:2px">
                    cupo: ${g.max_companions === 0 ? '1 persona' : g.max_companions === 1 ? '1+1' : '1+2'}
                    ${g.phone ? `· 📱 ${g.phone}` : ''}
                  </div>
                </td>
                <td>
                  <code style="font-size:12px;background:#f0ece4;padding:2px 6px;border-radius:4px;letter-spacing:1px">${g.invite_code}</code>
                  <button onclick="navigator.clipboard.writeText('${inviteUrl}').then(()=>this.textContent='✓').catch(()=>{})"
                    style="display:block;margin-top:4px;background:none;border:1px solid #B8D0E5;border-radius:6px;padding:3px 8px;font-size:11px;color:#4A6F8F;cursor:pointer">
                    Copiar enlace
                  </button>
                </td>
                <td>${badge}</td>
                <td>${people || '<span style="color:#ccc;font-size:12px">—</span>'}</td>
                <td style="font-size:12px;color:#7A6E63">${date}</td>
                <td>
                  ${actionBtn}
                  <button class="btn-del" onclick="deleteGuest('${g.id}', ${jName})">✕ Eliminar</button>
                </td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
      <div id="no-results" class="no-results" style="display:none">No se encontraron invitados con ese nombre</div>
    `;
  } catch (err) {
    content.innerHTML = '<div class="loading" style="color:#B05050">Error al cargar. Revisa tu conexión.</div>';
  }
}

async function addGuest() {
  const name       = document.getElementById('new-name').value.trim();
  const companions = document.getElementById('new-companions').value;
  const phone      = document.getElementById('new-phone').value.trim();
  const msg        = document.getElementById('add-msg');

  if (!name) {
    msg.textContent = 'Por favor ingresa el nombre del invitado.';
    msg.style.color = '#B05050';
    msg.style.display = 'block';
    return;
  }

  try {
    const res = await fetch(`/api/admin/guests?token=${encodeURIComponent(adminToken)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, max_companions: parseInt(companions, 10), phone: phone || null }),
    });
    const data = await res.json();
    if (!res.ok) {
      msg.textContent = data.error || 'Error al agregar invitado.';
      msg.style.color = '#B05050';
      msg.style.display = 'block';
      return;
    }
    document.getElementById('new-name').value = '';
    document.getElementById('new-companions').value = '0';
    document.getElementById('new-phone').value = '';
    msg.textContent = `✓ "${data.guest.name}" agregado · Código: ${data.guest.invite_code}`;
    msg.style.color = '#3a7a5a';
    msg.style.display = 'block';
    setTimeout(() => { msg.style.display = 'none'; }, 7000);
    loadData();
  } catch {
    msg.textContent = 'Error de conexión.';
    msg.style.color = '#B05050';
    msg.style.display = 'block';
  }
}

async function deleteGuest(id, name) {
  if (!confirm(`¿Eliminar a "${name}"?\n\nEsto borrará también su confirmación de asistencia.`)) return;
  try {
    const res = await fetch(`/api/admin/guests/${id}?token=${encodeURIComponent(adminToken)}`, {
      method: 'DELETE',
    });
    const data = await res.json();
    if (!res.ok) { alert(data.error || 'Error al eliminar.'); return; }
    loadData();
  } catch {
    alert('Error de conexión.');
  }
}

  const firstName = guestName.split(' ')[0];
  const url = `https://boda-jeifry.duckdns.org/?g=${inviteCode}`;
  return [
    `💍 ¡Hola, ${firstName}!`,
    '',
    `Te recordamos que tienes una invitación pendiente para la boda de Jeifry y Karen 💕`,
    '',
    '📅 Viernes 19 de junio de 2026',
    '🕖 7:00 PM',
    '📍 Barrio El Prado, Calle 76 #52-06',
    '   Barranquilla, Atlántico',
    '',
    'Por favor confirma tu asistencia aquí:',
    `🔗 ${url}`,
    '',
    '¡Te esperamos! 💐',
  ].join('\n');
}

function buildInvitationMessage(guestName, inviteCode) {
  const firstName = guestName.split(' ')[0];
  const url = `https://boda-jeifry.duckdns.org/?g=${inviteCode}`;
  return [
    `💍 *¡Hola, ${firstName}!*`,
    '',
    `*Jeifry y Karen* te invitan a celebrar su boda 🎊`,
    '',
    '📅 *Viernes 19 de junio de 2026*',
    '🕖 7:00 PM',
    '📍 Barrio El Prado, Calle 76 #52-06',
    '   Barranquilla, Atlántico',
    '',
    'Para ver tu invitación y confirmar asistencia entra aquí:',
    `🔗 ${url}`,
    '',
    '_¡Te esperamos con mucho amor!_ 💐',
  ].join('\n');
}

function openResendModal(guestId, guestName, inviteCode, phone, isFirstSend) {
  _resendGuestId = guestId;
  document.getElementById('resend-title').textContent = isFirstSend
    ? `Enviar invitación a ${guestName}`
    : `Reenviar invitación a ${guestName}`;
  document.getElementById('resend-phone').textContent  = `📱 +57${phone.replace(/^57/, '')}`;
  document.getElementById('resend-text').value         = isFirstSend
    ? buildInvitationMessage(guestName, inviteCode)
    : buildDefaultResendMessage(guestName, inviteCode);
  document.getElementById('resend-msg').style.display  = 'none';
  document.getElementById('resend-send-btn').disabled  = false;
  document.getElementById('resend-overlay').classList.add('open');
  setTimeout(() => document.getElementById('resend-text').focus(), 50);
}

function closeResendModal() {
  document.getElementById('resend-overlay').classList.remove('open');
  _resendGuestId = null;
}

// Cerrar al hacer click fuera del modal
document.getElementById('resend-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('resend-overlay')) closeResendModal();
});

async function sendResend() {
  const message = document.getElementById('resend-text').value.trim();
  const btn     = document.getElementById('resend-send-btn');
  const msg     = document.getElementById('resend-msg');

  if (!message) return;

  btn.disabled    = true;
  btn.textContent = 'Enviando…';
  msg.style.display = 'none';

  try {
    const res  = await fetch(`/api/admin/guests/${_resendGuestId}/resend?token=${encodeURIComponent(adminToken)}`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ message }),
    });
    const data = await res.json();

    if (!res.ok) {
      msg.textContent       = data.error || 'Error al enviar.';
      msg.style.color       = '#B05050';
      msg.style.display     = 'block';
      btn.disabled          = false;
      btn.textContent       = 'Enviar por WhatsApp';
      return;
    }

    msg.textContent   = '✓ Mensaje enviado correctamente';
    msg.style.color   = '#3a7a5a';
    msg.style.display = 'block';
    btn.textContent   = '✓ Enviado';
    setTimeout(() => closeResendModal(), 1800);
  } catch {
    msg.textContent   = 'Error de conexión.';
    msg.style.color   = '#B05050';
    msg.style.display = 'block';
    btn.disabled      = false;
    btn.textContent   = 'Enviar por WhatsApp';
  }
}

function filterGuests(query) {
  const q = query.toLowerCase().trim();
  const rows = document.querySelectorAll('#guests-tbody tr');
  let visible = 0;
  rows.forEach(row => {
    const match = !q || row.dataset.name.includes(q);
    row.style.display = match ? '' : 'none';
    if (match) visible++;
  });
  const noResults = document.getElementById('no-results');
  const table = document.getElementById('guests-table');
  if (noResults) noResults.style.display = visible === 0 ? 'block' : 'none';
  if (table)     table.style.display     = visible === 0 ? 'none'  : '';
}

// Auto-load if token is in URL param (e.g. ?token=xxx)
const urlToken = new URLSearchParams(window.location.search).get('token');
if (urlToken) {
  adminToken = urlToken;
  loadData();
}

// ── WhatsApp status & QR ──────────────────────────────────────────
let _waPolling = null;
let _lastQR    = null;

async function checkWAStatus() {
  try {
    const res  = await fetch(`/api/admin/whatsapp-status?token=${encodeURIComponent(adminToken)}`);
    if (!res.ok) return;
    const { ready, qr } = await res.json();

    const dot   = document.getElementById('wa-dot');
    const label = document.getElementById('wa-label');
    const btn   = document.getElementById('wa-qr-btn');

    if (ready) {
      dot.className   = 'wa-dot connected';
      label.textContent = 'WhatsApp conectado ✓';
      btn.style.display = 'none';
      closeQR();
    } else if (qr) {
      dot.className   = 'wa-dot waiting';
      label.textContent = 'WhatsApp: escanea el QR para activar';
      btn.style.display = 'inline-block';
      if (qr !== _lastQR) {
        _lastQR = qr;
        renderQR(qr);
      }
    } else {
      dot.className   = 'wa-dot';
      label.textContent = 'WhatsApp: iniciando…';
      btn.style.display = 'none';
    }
  } catch (_) {}
}

function renderQR(qrString) {
  const canvas = document.getElementById('wa-qr-canvas');
  QRCode.toCanvas(canvas, qrString, { width: 240, margin: 2 }, err => {
    if (err) document.getElementById('wa-qr-msg').textContent = 'Error generando QR';
  });
}

function openQR() {
  document.getElementById('wa-qr-overlay').classList.add('open');
  if (_lastQR) renderQR(_lastQR);
}

function closeQR() {
  document.getElementById('wa-qr-overlay').classList.remove('open');
}

function startWAPolling() {
  if (_waPolling) return;
  checkWAStatus();
  _waPolling = setInterval(checkWAStatus, 5000);
}

document.getElementById('wa-qr-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('wa-qr-overlay')) closeQR();
});
</script>
